packages:
  - packages/*
  - boilerplates/*
  - website

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  better-sqlite3: true
  esbuild: true
  nx: true
  prisma: true
  puppeteer: true
  sharp: true
  workerd: true

autoInstallPeers: false

hoistPattern:
  - '@batijs/*'
  - '!@batijs/compile'
  - '!@batijs/core'
  - '!@batijs/build'
  - '!@batijs/features'

injectWorkspacePackages: true

linkWorkspacePackages: true

onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@browserless/goto'
  - '@prisma/client'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@tailwindcss/oxide'
  - aws-sdk
  - better-sqlite3
  - es5-ext
  - esbuild
  - nx
  - oxc-resolver
  - prisma
  - protobufjs
  - puppeteer
  - re2
  - sharp
  - workerd

packageManagerStrictVersion: false

shamefullyHoist: true

# Nx's run-script executor spawns one `pnpm run <script>` per package in
# parallel. Each invocation's pre-run deps check reads/refreshes the shared
# workspace-state cache in node_modules, so concurrent runs can read a
# half-written file ("Unexpected end of JSON input"). The check is redundant
# here (CI installs right before building), so disable it.
verifyDepsBeforeRun: false
