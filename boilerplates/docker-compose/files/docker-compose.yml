services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # BATI.hasDatabase
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

# BATI.hasDatabase
volumes:
  sqlite_data:
