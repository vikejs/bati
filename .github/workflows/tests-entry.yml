name: Tests

on:
  pull_request:
    paths-ignore:
      - "website/**"
  push:
    # Ensures cache is computed on main branch so that it can be reused on all PRs
    branches: [ "main" ]
    paths-ignore:
      - "website/**"

concurrency:
  group: tests-entry-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  BUN_VERSION: "1.3.11"

jobs:
  # Fast Windows — one representative combo (no docker/postgres)
  init-windows:
    name: Windows
    uses: ./.github/workflows/reusable.init-tests.yml
    secrets: inherit
    with:
      os: windows-latest

  tests-windows:
    needs: init-windows
    uses: ./.github/workflows/reusable.run-tests.yml
    secrets: inherit
    with:
      os: windows-latest
      flags: react,hono,authjs,eslint,biome,oxlint
      name: react--hono--authjs (windows)

  # Fast MacOS — one representative combo
  init-macos:
    name: MacOS
    uses: ./.github/workflows/reusable.init-tests.yml
    secrets: inherit
    with:
      os: macos-latest

  tests-macos:
    needs: init-macos
    uses: ./.github/workflows/reusable.run-tests.yml
    secrets: inherit
    with:
      os: macos-latest
      flags: react,hono,authjs,eslint,biome,oxlint
      name: react--hono--authjs (mac)

  # Full Ubuntu — the matrix is generated from matrix.ts by the init job
  init-ubuntu:
    name: Ubuntu
    uses: ./.github/workflows/reusable.init-tests.yml
    secrets: inherit
    with:
      os: ubuntu-latest

  tests-ubuntu:
    needs: init-ubuntu
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.init-ubuntu.outputs.combos) }}
    uses: ./.github/workflows/reusable.run-tests.yml
    secrets: inherit
    with:
      os: ubuntu-latest
      flags: ${{ matrix.flags }}
      name: ${{ matrix.name }}
