on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      flags:
        required: true
        type: string # --flag list, e.g. "--react --hono --drizzle --sqlite --eslint --biome --oxlint"
      name:
        required: true
        type: string

concurrency:
  group: tests-run-${{ inputs.os }}-${{ inputs.name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  BUN_VERSION: "1.3.11"

jobs:
  run:
    runs-on: ${{ inputs.os }}
    # The combo is the caller job's name; this nested name only adds the OS (UI shows "<combo> / <os>").
    name: ${{ inputs.os }}
    env:
      BATI_TEST: true
      TEST_AUTH0_CLIENT_ID: ${{ secrets.TEST_AUTH0_CLIENT_ID }}
      TEST_AUTH0_ISSUER_BASE_URL: ${{ secrets.TEST_AUTH0_ISSUER_BASE_URL }}
      TEST_GITHUB_CLIENT_ID: ${{ secrets.TEST_GITHUB_CLIENT_ID }}
      TEST_GITHUB_CLIENT_SECRET: ${{ secrets.TEST_GITHUB_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        name: Install bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Restore built dists
        uses: actions/download-artifact@v8
        with:
          name: bati-dist-${{ inputs.os }}-${{ env.NODE_VERSION }}
          # init uploads every packages/*/dist, so upload-artifact roots the archive at
          # packages/ and its entries are <pkg>/dist — restore them back under packages/,
          # where the CLI + harness resolve their @batijs/* workspace deps at runtime.
          path: packages

      # Generates the app, installs it, migrates, boots, runs every assertion + the
      # smoke pass + lint/typecheck/knip — starting/stopping postgres + docker as the
      # combo needs.
      - name: Run e2e
        run: bun packages/tests/e2e/runner.ts exact ${{ inputs.flags }}
