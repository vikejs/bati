name: Checks

on:
  pull_request:
  push:
    # Ensures cache is computed on main branch so that it can be reused on all PRs
    branches: [ "main" ]

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check-types:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["22", "24"]
      fail-fast: false

    name: Lint & Typecheck - node@${{ matrix.node }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        name: Install bun
        with:
          bun-version: 1.3.11

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: mkdir temp folder
        run: mkdir -p ${{ runner.temp }}/bati-cache

      - uses: actions/cache/restore@v6
        name: Setup Nx cache
        with:
          path: .nx/cache
          key: ${{ runner.os }}-${{ matrix.node }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node }}-nx-

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Run check types
        run: bun run check-types

      - name: Run lint
        run: bun run lint
