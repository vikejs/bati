on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
    outputs:
      combos:
        description: "The e2e matrix as JSON — one entry per combo, for the run fan-out."
        value: ${{ jobs.init.outputs.combos }}

concurrency:
  group: tests-init-${{ inputs.os }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  BUN_VERSION: "1.3.11"

jobs:
  init:
    runs-on: ${{ inputs.os }}
    name: ${{ inputs.os }}
    outputs:
      combos: ${{ steps.list.outputs.combos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        name: Install bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Unit tests
        run: bun run test

      # The runner reads matrix.ts and emits the combos the run jobs fan out over.
      - name: Compute matrix
        id: list
        shell: bash
        run: echo "combos=$(bun packages/tests/e2e/runner.ts --list)" >> "$GITHUB_OUTPUT"

      # Ship every built package dist. The CLI + harness resolve their @batijs/*
      # workspace deps (core, features, …) from these at runtime; that set is
      # transitive and easy to under-specify, so upload them all rather than list.
      - name: Archive built dists
        uses: actions/upload-artifact@v7
        with:
          name: bati-dist-${{ inputs.os }}-${{ env.NODE_VERSION }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true
          include-hidden-files: true
          path: |
            packages/*/dist
